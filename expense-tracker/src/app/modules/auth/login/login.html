<div class="auth-shell">
  <div class="auth-card">
    <div class="brand-block">
      <h1>Expense Tracker</h1>
      <p>Manage your finances smartly</p>
    </div>

    <mat-card>
      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="you@example.com" />
          <mat-error *ngIf="email?.hasError('required')">Email is required.</mat-error>
          <mat-error *ngIf="email?.hasError('email')">Enter a valid email address.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" placeholder="Enter password" />
          <mat-error *ngIf="password?.hasError('required')">Password is required.</mat-error>
          <mat-error *ngIf="password?.hasError('minlength')">Password must be at least 6 characters.</mat-error>
        </mat-form-field>

        <div *ngIf="apiError" class="api-error">{{ apiError }}</div>

        <button mat-flat-button class="action-button" type="submit" [disabled]="submitting || form.invalid">
          Login
        </button>
      </form>

      <div class="auth-footer">
        <span>Don't have an account?</span>
        <a routerLink="/auth/register">Register</a>
      </div>
    </mat-card>
  </div>
</div>
