<div class="container mx-auto p-6">
  <div class="flex gap-6 justify-between">
    <div>
      <h1 class="text-2xl font-semibold">Expense Management</h1>
      <p class="mt-2 text-gray-600">Track and categorize your expenses</p>
    </div>
    <div class="flex gap-4">
   <button mat-raised-button class="button" color="accent" (click)="fileInput.click()">
  <mat-icon>upload</mat-icon>
</button>

<input 
  type="file" 
  #fileInput 
  hidden 
  (change)="onFileSelected($event)" 
  accept=".csv,.xlsx" />

      <button class="button" (click)="addExpense()">+ Add Expense</button>
    </div>
  </div>

  <!-- KPI Cards -->
  <div class="flex gap-6 mt-4">
    <mat-card class="w-1/3 p-4 bg-white shadow-md">
      <p class="text-sm text-gray-500">Total (YTD)</p>
      <p class="text-xl font-semibold">₹{{totalExpense}}</p>
      <p class="text-green-600 text-sm">+12.5%</p>
    </mat-card>

    <mat-card class="w-1/3 p-4 shadow-md">
      <p class="text-sm text-gray-500">This Month</p>
      <p class="text-xl font-semibold">₹{{currentMonthExpense}}</p>
      <p class="text-green-600 text-sm">+8.2%</p>
    </mat-card>

    <mat-card class="w-1/3 p-4 shadow-md">
      <p class="text-sm text-gray-500">Average Daily</p>
      <p class="text-xl font-semibold">₹{{dailyAverage}}</p>
      <p class="text-gray-500 text-sm">Last 30 days</p>
    </mat-card>
    <mat-card class="w-1/3 p-4 shadow-md">
      <p class="text-sm text-gray-500">Budget Left</p>
      <p class="text-xl font-semibold">₹{{budgetLeft}}</p>
      <p class="text-gray-500 text-sm">Based on 12 months</p>
    </mat-card>
  </div>

  <!-- Search -->
<mat-card class="mt-6 p-4 shadow-2xl">

  <div class="flex items-center gap-4">

    <mat-form-field appearance="fill" class="w-1/2">
      <mat-icon matPrefix>search</mat-icon>
      <input 
        matInput 
        placeholder="Search expense entries" 
        [formControl]="searchValue" (input)="searchbyCategory()" />
    </mat-form-field>

    <button 
      mat-raised-button 
      color="primary" 
      class="flex items-center gap-1 cursor-pointer"
      (click)="downloadReport()" [matTooltip]="'Download expense report'">
      <mat-icon >download</mat-icon>
      Download
    </button>

  </div>

  <!-- Categories Row -->
  <div class="flex gap-4 mt-4 flex-wrap">
    <mat-card 
      *ngFor="let item of categories; trackBy: trackById" 
      class="shadow-2xl w-30 h-14 flex items-center justify-center cursor-pointer"
      (click)="filterByCategory(item.id)">
      
      {{ item.name }}
      
    </mat-card>
  </div>

</mat-card>
  <mat-card class="mt-6 p-4 shadow-2xl">
    <app-expense-list [expenseList]="expenseList" (edit)="editExpense($event)" (delete)="onDeleted($event)"></app-expense-list>
  </mat-card>
</div>
